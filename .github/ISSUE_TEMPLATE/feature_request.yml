name: 💡 Feature request
description: Suggest a new example/package or an improvement
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What you propose to add or improve, and why
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What problem this solves
    validations:
      required: false
