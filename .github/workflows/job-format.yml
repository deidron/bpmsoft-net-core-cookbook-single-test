name: 'Job: Format'

on:
  workflow_call:
    inputs:
      packages:
        required: true
        type: string
    secrets:
      GH_PAT:
        description: 'Token to read the private platform-libs repo (optional)'
        required: false

permissions:
  contents: read

jobs:
  format:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(inputs.packages) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-dotnet-env

      # Platform reference assemblies — dotnet format --severity info runs analyzers,
      # which need the references to resolve. Restored from the private repo when
      # PLATFORM_LIBS_REPO is set; otherwise skipped (relies on committed DLLs).
      - name: Restore platform libs
        if: vars.PLATFORM_LIBS_REPO != ''
        uses: ./.github/actions/restore-platform-libs
        with:
          repo: ${{ vars.PLATFORM_LIBS_REPO }}
          token: ${{ secrets.GH_PAT }}

      - run: bash .github/scripts/format.sh "${{ matrix.package }}"
